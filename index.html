<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Casillas con historial</title>
  <style>
    .info-previa {
      font-size: 12px;
      color: gray;
    }
    input {
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>
<body>
  <h2>Formulario con historial</h2>
  
  <label>
    Nombre:
    <input type="text" id="nombre" placeholder="Escribe tu nombre">
    <div id="prev-nombre" class="info-previa"></div>
  </label>
  
  <label>
    Correo:
    <input type="email" id="correo" placeholder="Escribe tu correo">
    <div id="prev-correo" class="info-previa"></div>
  </label>
  
  <script>
    // Función para guardar y mostrar el valor anterior
    function mantenerHistorial(idInput, idPrevio) {
      const input = document.getElementById(idInput);
      const divPrevio = document.getElementById(idPrevio);
      
      input.addEventListener("focus", () => {
        if (input.value) {
          divPrevio.textContent = "Valor anterior: " + input.value;
        }
      });
      
      input.addEventListener("blur", () => {
        if (input.value) {
          divPrevio.textContent = "Último guardado: " + input.value;
        }
      });
    }
    
    // Aplicar la función a cada casilla
    mantenerHistorial("nombre", "prev-nombre");
    mantenerHistorial("correo", "prev-correo");
  </script>
</body>
</html>
